// ============================================================
// UPDATE (per frame)
// ============================================================
let lastDt = 0;
function update(dt) {
  if (state.screen !== 'racing') return;

  // Countdown runs regardless of pause. World is frozen while it's > 0.
  if (state.countdown > -0.6) {
    state.countdown -= dt;
    const remaining = Math.ceil(state.countdown);
    if (state.countdown > 0 && remaining !== state.lastCountdownTick) {
      state.lastCountdownTick = remaining;
      playCountdownTick();
      speak(String(remaining));
    }
    if (state.countdown <= 0 && state.lastCountdownTick !== 0) {
      state.lastCountdownTick = 0;
      playCountdownGo();
      speak('Go!');
      startMusic();
    }
    if (state.countdown > 0) return;
  }

  if (state.paused) return;
  lastDt = dt;
  state.raceTime += dt;

  // Target speed based on modifiers
  let mult = 1.0;
  if (state.boostTimer > 0) {
    mult = BOOST_MULT;
    state.boostTimer = Math.max(0, state.boostTimer - dt);
  }
  if (state.slowTimer > 0) {
    mult = SLOW_MULT;
    state.slowTimer = Math.max(0, state.slowTimer - dt);
  }
  state.targetSpeed = state.baseSpeed * mult;
  state.speed = lerp(state.speed, state.targetSpeed, Math.min(1, dt * 4));

  // Player world position
  state.playerZ += state.speed * dt;
  state.scrollAccum += state.speed * dt;

  // Opponent rubber-banding
  const gap = state.opponentZ - state.playerZ;
  let oppSpeed = state.opponentSpeed;
  if (gap > RUBBER_BAND_AHEAD) oppSpeed *= 0.7;
  else if (gap < -RUBBER_BAND_BEHIND) oppSpeed *= 1.35;
  else if (gap < -0.5) oppSpeed *= 1.15;
  else if (gap > 1.5) oppSpeed *= 0.9;
  state.opponentZ += oppSpeed * dt;

  // Lane switching animation
  if (state.laneAnimT < 1) {
    state.laneAnimT = Math.min(1, state.laneAnimT + (1 / LANE_SWITCH_TIME) * dt);
    state.laneAnim = lerp(state.laneAnim, state.laneTarget, easeInOut(state.laneAnimT));
    if (state.laneAnimT >= 1) state.laneAnim = state.laneTarget;
  }

  // Boost jump animation
  if (state.boostTimer > 0) {
    // Rise, hover, fall
    const t = 1 - state.boostTimer / BOOST_TIME;
    // Simple bell curve
    state.jumpY = 30 * Math.sin(Math.min(1, t * Math.PI / 0.9) * Math.PI);
    if (state.boostTimer < 0.5) state.jumpY *= state.boostTimer / 0.5;
  } else {
    state.jumpY *= 0.9;
    if (state.jumpY < 0.5) state.jumpY = 0;
  }

  spawnObstacles();
  spawnPickups();
  updateObstaclePositions();
  updateOpponentLane();
  checkCollisions();
  updateEngine();
  updateProgressMarkers();

  // Camera shake decay
  if (cameraShake > 0) cameraShake = Math.max(0, cameraShake - dt * 2);

  // Finish detection
  if (!state.opponentFinished && state.opponentZ >= RACE_DISTANCE) {
    state.opponentFinished = true;
  }
  if (!state.raceFinished && state.playerZ >= RACE_DISTANCE) {
    state.raceFinished = true;
    // Player finished. Won if opponent hasn't yet.
    state.wonThisRace = !state.opponentFinished;
    endRace(state.wonThisRace);
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = 0;
function frame(t) {
  const dt = Math.min(0.05, lastTime ? (t - lastTime) / 1000 : 0);
  lastTime = t;
  update(dt);
  if (state.screen === 'racing' || state.screen === 'modal') {
    ctx.save();
    if (cameraShake > 0) {
      ctx.translate((Math.random() - 0.5) * 8 * cameraShake, (Math.random() - 0.5) * 8 * cameraShake);
    }
    render(dt);
    ctx.restore();
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ============================================================
// INPUT
// ============================================================
document.addEventListener('keydown', (e) => {
  if (state.screen !== 'racing') return;
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { switchLane(-1); e.preventDefault(); }
  else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { switchLane(1); e.preventDefault(); }
});

document.getElementById('touch-left').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  switchLane(-1);
});
document.getElementById('touch-right').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  switchLane(1);
});

// Also handle tap on canvas for desktop-with-touch
canvas.addEventListener('pointerdown', (e) => {
  if (state.screen !== 'racing') return;
  // Ignore if it's a mouse click - keyboard is preferred there
  if (e.pointerType === 'mouse') return;
  if (e.clientX < W / 2) switchLane(-1);
  else switchLane(1);
});

// ============================================================
// GARAGE / UI
// ============================================================
const previewCanvas = document.getElementById('preview');
const previewCtx = previewCanvas.getContext('2d');
let previewT = 0;

// Preview reuses the runtime drawVehicle path by swapping `ctx` to the
// preview canvas for the vehicle draw call. Safe because tickPreview and
// the main render frame never overlap in JS.
function tickPreview() {
  previewT += 0.016;
  if (state.screen === 'garage') {
    const pw = previewCanvas.width;
    const ph = previewCanvas.height;
    const g = previewCtx.createLinearGradient(0, 0, 0, ph);
    g.addColorStop(0, '#3a2e6a');
    g.addColorStop(1, '#1a1030');
    previewCtx.fillStyle = g;
    previewCtx.fillRect(0, 0, pw, ph);
    previewCtx.strokeStyle = 'rgba(255,207,64,0.15)';
    previewCtx.lineWidth = 1;
    for (let i = 1; i < 8; i++) {
      const y = ph * (0.55 + i * 0.05);
      previewCtx.beginPath();
      previewCtx.moveTo(0, y);
      previewCtx.lineTo(pw, y);
      previewCtx.stroke();
    }
    const spot = previewCtx.createRadialGradient(pw / 2, ph * 0.7, 10, pw / 2, ph * 0.7, pw * 0.6);
    spot.addColorStop(0, 'rgba(255,240,180,0.25)');
    spot.addColorStop(1, 'rgba(255,240,180,0)');
    previewCtx.fillStyle = spot;
    previewCtx.fillRect(0, 0, pw, ph);
    ctx = previewCtx;
    drawVehicle(pw / 2, ph * 0.95 + Math.sin(previewT * 2) * 3, 1.3, state.vehicle, COLORS[state.color], true);
    ctx = mainCtx;
  }
  requestAnimationFrame(tickPreview);
}

requestAnimationFrame(tickPreview);

// ============================================================
// GARAGE UI WIRING
// ============================================================
function buildColorSwatches() {
  const row = document.getElementById('color-row');
  row.innerHTML = '';
  Object.keys(COLORS).forEach(colorName => {
    const btn = document.createElement('button');
    btn.className = 'swatch';
    btn.type = 'button';
    btn.style.background = COLORS[colorName];
    btn.dataset.color = colorName;
    btn.setAttribute('aria-label', colorName);
    if (colorName === state.color) btn.classList.add('selected');
    btn.addEventListener('click', () => {
      state.color = colorName;
      updateSwatchSelection();
      savePrefs();
    });
    row.appendChild(btn);
  });
}
function updateSwatchSelection() {
  document.querySelectorAll('#color-row .swatch').forEach(b => {
    b.classList.toggle('selected', b.dataset.color === state.color);
  });
}
function wireVehicleChips() {
  document.querySelectorAll('#vehicle-row .chip').forEach(btn => {
    if (btn.dataset.vehicle === state.vehicle) btn.classList.add('selected');
    btn.addEventListener('click', () => {
      state.vehicle = btn.dataset.vehicle;
      document.querySelectorAll('#vehicle-row .chip').forEach(b => {
        b.classList.toggle('selected', b.dataset.vehicle === state.vehicle);
      });
      savePrefs();
    });
  });
}
function wireAgeButtons() {
  const row = document.getElementById('age-row');
  row.innerHTML = '';
  for (let a = 3; a <= 13; a++) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'chip age-chip';
    btn.textContent = a;
    btn.dataset.age = a;
    if (a === state.age) btn.classList.add('selected');
    btn.addEventListener('click', () => {
      state.age = a;
      row.querySelectorAll('.chip').forEach(b => {
        b.classList.toggle('selected', Number(b.dataset.age) === state.age);
      });
      savePrefs();
    });
    row.appendChild(btn);
  }
}
function wireStartButton() {
  document.getElementById('start-btn').addEventListener('click', () => {
    initAudio();
    // Resume AudioContext (required for autoplay policies)
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    // Prime speech synthesis
    if ('speechSynthesis' in window) {
      try {
        const u = new SpeechSynthesisUtterance(' ');
        u.volume = 0;
        window.speechSynthesis.speak(u);
      } catch (e) {}
    }
    startRace(1);
  });
}
function wireResultsButtons() {
  document.getElementById('results-next').addEventListener('click', nextRace);
  document.getElementById('results-garage').addEventListener('click', () => {
    document.getElementById('results').hidden = true;
    document.getElementById('game').hidden = true;
    document.getElementById('garage').hidden = false;
    state.screen = 'garage';
    stopEngine();
    stopMusic();
    cancelSpeech();
  });
}
function wireHudButtons() {
  const muteBtn = document.getElementById('mute-btn');
  muteBtn.textContent = muted ? '🔇' : '🔊';
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
    if (muted) { stopMusic(); cancelSpeech(); }
    else if (state.screen === 'racing') startMusic();
    savePrefs();
  });
  document.getElementById('quit-btn').addEventListener('click', () => {
    stopEngine();
    stopMusic();
    cancelSpeech();
    document.getElementById('game').hidden = true;
    modalEl.hidden = true;
    document.getElementById('results').hidden = true;
    document.getElementById('garage').hidden = false;
    state.screen = 'garage';
  });
}

// ============================================================
// INIT
// ============================================================
loadPrefs();
buildColorSwatches();
wireVehicleChips();
wireAgeButtons();
wireStartButton();
wireResultsButtons();
wireHudButtons();

// Handle visibility change to pause music
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopMusic();
    cancelSpeech();
    if (state.screen === 'racing') state.paused = true;
  } else {
    if (state.screen === 'racing' && !modalEl.hidden === false) {
      state.paused = false;
      startMusic();
    }
  }
});

</script>
